services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      PORT: 4000
      API_SERVICE_TOKEN: ""
      RAG_ENABLED: "true"
      RAG_OLLAMA_BASE_URL: http://ollama:11434
      RAG_GENERATION_MODEL: qwen2.5-coder:7b
      RAG_EVAL_GENERATION_MODEL: qwen2.5-coder:14b
      RAG_EMBED_MODEL: nomic-embed-text
      RAG_BUILD_DIR: /rag-ml/build
      RAG_KB_DIR: /rag-ml/kb
      RAG_SUPPORTED_LANGUAGES: python,dart,swift,cpp,javascript
      RAG_ENABLE_SECURITY: "false"
      RAG_ENABLE_PERFORMANCE: "true"
      RAG_DEFAULT_TOPK: "6"
      RAG_MAX_HUNKS_PER_FILE: "3"
      RAG_EMBED_BATCH_SIZE: "64"
      RAG_GENERATION_MAX_TOKENS: "256"
      RAG_OLLAMA_TIMEOUT_SECONDS: "120"
    ports:
      - "4000:4000"
    depends_on:
      - ollama
    volumes:
      - ./rag-ml:/rag-ml

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  ollama_data:
